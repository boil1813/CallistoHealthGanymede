<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callisto Health - 친구와 함께하는 다이어트 관리</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Main JS (ES Modules) -->
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="web-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Callisto</h1>
                <span class="logo-sub">Health</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <span class="material-icons-round">dashboard</span>
                    <span>대시보드</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">restaurant_menu</span>
                    <span>식단 관리</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">fitness_center</span>
                    <span>운동 루틴</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">insights</span>
                    <span>통계 및 진행상황</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <span class="material-icons-round">settings</span>
                    <span>설정</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="search-bar">
                    <span class="material-icons-round">search</span>
                    <input type="text" placeholder="검색...">
                </div>
                <div class="header-actions">
                    <button class="icon-button"><span class="material-icons-round">notifications</span></button>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=ff6b6b&color=fff&rounded=true" alt="User Profile" class="avatar">
                        <span class="user-name">사용자 님</span>
                        <span class="material-icons-round expand-icon">expand_more</span>
                    </div>
                </div>
            </header>

            <!-- Dashboard Grid -->
            <main class="dashboard-grid">
                <!-- Greeting -->
                <section class="greeting-section">
                    <div>
                        <h2>오늘도 화이팅하세요! 🚀</h2>
                        <p>오늘의 <strong>식단과 운동 루틴</strong>을 기록해보세요.</p>
                    </div>
                </section>

                <!-- Summary Widget (Web Component) -->
                <section class="summary-section">
                    <summary-widget></summary-widget>
                </section>

                <div class="plan-columns">
                    <!-- Diet Plan Section -->
                    <section class="plan-section diet-section card">
                        <div class="section-header">
                            <div>
                                <h3>오늘의 식단 🥗</h3>
                                <p class="section-subtitle">권장 칼로리: 1800kcal</p>
                            </div>
                            <span class="status-badge success">오늘의 기록</span>
                        </div>
                        
                        <div class="add-task-form">
                            <input type="text" id="new-diet-title" class="task-input" placeholder="메뉴 (예: 닭가슴살 샐러드)">
                            <input type="text" id="new-diet-detail" class="task-input small" placeholder="칼로리 (예: 300 kcal)">
                            <button id="add-diet-btn" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                        </div>

                        <!-- Task List Web Component for Diet -->
                        <task-list id="diet-tasks"></task-list>
                    </section>

                    <!-- Exercise Plan Section -->
                    <section class="plan-section exercise-section card">
                        <div class="section-header">
                            <div>
                                <h3>오늘의 운동 🏃</h3>
                                <p class="section-subtitle">목표 소모량: 400kcal</p>
                            </div>
                            <span class="status-badge warning">필수 완료</span>
                        </div>
                        <!-- Task List Web Component for Exercise -->
                        <task-list id="exercise-tasks"></task-list>
                    </section>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
