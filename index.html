<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형근이의 채찍질</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Main JS (ES Modules) -->
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="web-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Callisto</h1>
                <span class="logo-sub">Health</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active">
                    <span class="material-icons-round">dashboard</span>
                    <span>대시보드</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">restaurant_menu</span>
                    <span>식단 관리</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">fitness_center</span>
                    <span>운동 루틴</span>
                </a>
                <a href="statistics.html" class="nav-item">
                    <span class="material-icons-round">insights</span>
                    <span>통계 및 진행상황</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <span class="material-icons-round">settings</span>
                    <span>설정</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Header (Simplified) -->
            <header class="top-header">
                <div class="header-date">
                    <span class="material-icons-round">calendar_today</span>
                    <span id="current-date">2026년 3월 2일 월요일</span>
                </div>
            </header>

            <!-- Dashboard Grid -->
            <main class="dashboard-grid">
                <!-- Greeting -->
                <section class="greeting-section">
                    <div>
                        <h2>형근이의 채찍질 💪</h2>
                        <p><strong>목표를 위해 달려가자</strong></p>
                    </div>
                </section>

                <!-- Summary Widget (Web Component) -->
                <section class="summary-section card" style="margin-bottom: var(--space-xl);">
                    <summary-widget></summary-widget>
                </section>

                <div class="plan-columns">
                    <!-- Diet Plan Section -->
                    <section class="plan-section diet-section card">
                        <div class="section-header">
                            <div>
                                <h3>오늘의 식단 🥗</h3>
                            </div>
                            <span class="status-badge success">오늘의 기록</span>
                        </div>
                        
                        <!-- 아침 -->
                        <div class="meal-group">
                            <div class="meal-header">
                                <h4>아침 🍳</h4>
                                <div class="add-task-form mini">
                                    <input type="text" id="new-breakfast-title" class="task-input" placeholder="아침 메뉴 추가">
                                    <button onclick="window.addNewTask('breakfast')" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>
                            <task-list id="breakfast-tasks"></task-list>
                        </div>

                        <!-- 점심 -->
                        <div class="meal-group">
                            <div class="meal-header">
                                <h4>점심 ☀️</h4>
                                <div class="add-task-form mini">
                                    <input type="text" id="new-lunch-title" class="task-input" placeholder="점심 메뉴 추가">
                                    <button onclick="window.addNewTask('lunch')" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>
                            <task-list id="lunch-tasks"></task-list>
                        </div>

                        <!-- 저녁 -->
                        <div class="meal-group">
                            <div class="meal-header">
                                <h4>저녁 🌙</h4>
                                <div class="add-task-form mini">
                                    <input type="text" id="new-dinner-title" class="task-input" placeholder="저녁 메뉴 추가">
                                    <button onclick="window.addNewTask('dinner')" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>
                            <task-list id="dinner-tasks"></task-list>
                        </div>

                        <!-- 운동후 -->
                        <div class="meal-group">
                            <div class="meal-header">
                                <h4>운동후 💪</h4>
                                <div class="add-task-form mini">
                                    <input type="text" id="new-postWorkout-title" class="task-input" placeholder="운동후 메뉴 추가">
                                    <button onclick="window.addNewTask('postWorkout')" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>
                            <task-list id="postWorkout-tasks"></task-list>
                        </div>
                    </section>

                    <!-- Exercise Plan Section -->
                    <section class="plan-section exercise-section card">
                        <div class="section-header">
                            <div>
                                <h3>오늘의 운동 🏃</h3>
                            </div>
                            <span class="status-badge warning">오늘의 기록</span>
                        </div>
                        
                        <div class="add-exercise-form">
                            <!-- Type Selector -->
                            <div class="exercise-type-selector">
                                <label class="type-radio"><input type="radio" name="exercise-type" value="strength-upper" checked> 상체</label>
                                <label class="type-radio"><input type="radio" name="exercise-type" value="strength-lower"> 하체</label>
                                <label class="type-radio"><input type="radio" name="exercise-type" value="cardio"> 유산소</label>
                            </div>
                            
                            <!-- Strength Inputs (Upper/Lower) -->
                            <div id="strength-inputs" class="exercise-input-group">
                                <input type="text" id="new-strength-title" class="task-input" placeholder="운동명 (예: 벤치프레스)">
                                <div class="exercise-details-inputs">
                                    <input type="number" id="new-strength-weight" class="task-input small" placeholder="무게(kg)">
                                    <input type="number" id="new-strength-reps" class="task-input small" placeholder="횟수">
                                    <input type="number" id="new-strength-sets" class="task-input small" placeholder="세트">
                                    <button onclick="window.addExerciseTask()" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>

                            <!-- Cardio Inputs -->
                            <div id="cardio-inputs" class="exercise-input-group" style="display: none;">
                                <input type="text" id="new-cardio-title" class="task-input" placeholder="운동명 (예: 트레드밀)">
                                <div class="exercise-details-inputs">
                                    <input type="number" step="0.1" id="new-cardio-speed" class="task-input small" placeholder="속도">
                                    <input type="number" step="0.1" id="new-cardio-incline" class="task-input small" placeholder="경사도">
                                    <input type="number" id="new-cardio-time" class="task-input small" placeholder="시간(분)">
                                    <button onclick="window.addExerciseTask()" class="icon-button add-btn"><span class="material-icons-round">add</span></button>
                                </div>
                            </div>
                        </div>

                        <!-- Task List Web Component for Exercise -->
                        <task-list id="exercise-tasks"></task-list>
                    </section>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
