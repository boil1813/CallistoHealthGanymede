<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형근이의 채찍질 - 운동 종류</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .exercise-type-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
        }
        
        @media (max-width: 1024px) {
            .exercise-type-layout {
                grid-template-columns: 1fr;
            }
        }

        .exercise-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .exercise-list li {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--color-bg-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exercise-list li:last-child {
            border-bottom: none;
        }

        .exercise-list li .ex-name {
            font-weight: 600;
            color: var(--color-text-main);
            font-size: 1.05rem;
        }

        .exercise-list li .ex-desc {
            color: var(--color-text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .muscle-badge {
            background-color: var(--color-bg-main);
            color: var(--color-text-muted);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="web-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Callisto</h1>
                <span class="logo-sub">Health</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="material-icons-round">dashboard</span>
                    <span>대시보드</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-icons-round">restaurant_menu</span>
                    <span>식단 관리</span>
                </a>
                <a href="exercises.html" class="nav-item active">
                    <span class="material-icons-round">fitness_center</span>
                    <span>운동 종류</span>
                </a>
                <a href="statistics.html" class="nav-item">
                    <span class="material-icons-round">insights</span>
                    <span>통계 및 달력</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item">
                    <span class="material-icons-round">settings</span>
                    <span>설정</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-date">
                    <span class="material-icons-round">calendar_today</span>
                    <span id="current-date-exercises"></span>
                </div>
            </header>

            <!-- Dashboard Grid -->
            <main class="dashboard-grid">
                <!-- Greeting -->
                <section class="greeting-section">
                    <div>
                        <h2>운동 종류 가이드 🏋️</h2>
                        <p><strong>상체와 하체를 골고루 단련해 보세요.</strong></p>
                    </div>
                </section>

                <div class="exercise-type-layout">
                    <!-- Upper Body Section -->
                    <section class="card">
                        <div class="section-header">
                            <div>
                                <h3>상체 운동 (Upper Body)</h3>
                            </div>
                            <span class="status-badge" style="background-color: rgba(78, 205, 196, 0.15); color: var(--color-secondary);">가슴/등/어깨</span>
                        </div>
                        
                        <div class="add-task-form" style="flex-direction: column; gap: 8px;">
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <input type="text" id="new-upper-name" class="task-input" placeholder="새 상체 운동 이름" style="flex: 2;">
                                <input type="text" id="new-upper-target" class="task-input small" placeholder="타겟 부위" style="flex: 1;">
                            </div>
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <input type="text" id="new-upper-image" class="task-input" placeholder="이미지 URL (선택 사항)" style="flex: 1;">
                                <button id="add-upper-btn" class="icon-button add-btn" style="width: 40px; height: 40px;"><span class="material-icons-round">add</span></button>
                            </div>
                        </div>

                        <ul class="exercise-list" id="upper-exercise-list">
                            <!-- Populated dynamically -->
                        </ul>
                    </section>

                    <!-- Lower Body Section -->
                    <section class="card">
                        <div class="section-header">
                            <div>
                                <h3>하체 운동 (Lower Body)</h3>
                            </div>
                            <span class="status-badge" style="background-color: rgba(255, 107, 107, 0.15); color: var(--color-primary);">대퇴사두/햄스트링</span>
                        </div>

                        <div class="add-task-form" style="flex-direction: column; gap: 8px;">
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <input type="text" id="new-lower-name" class="task-input" placeholder="새 하체 운동 이름" style="flex: 2;">
                                <input type="text" id="new-lower-target" class="task-input small" placeholder="타겟 부위" style="flex: 1;">
                            </div>
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <input type="text" id="new-lower-image" class="task-input" placeholder="이미지 URL (선택 사항)" style="flex: 1;">
                                <button id="add-lower-btn" class="icon-button add-btn" style="width: 40px; height: 40px;"><span class="material-icons-round">add</span></button>
                            </div>
                        </div>
                        
                        <ul class="exercise-list" id="lower-exercise-list">
                            <!-- Populated dynamically -->
                        </ul>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="exercises.js"></script>
</body>
</html>
